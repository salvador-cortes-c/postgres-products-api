name: CI

'on':
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: products_db
          POSTGRES_USER: products_user
          POSTGRES_PASSWORD: products_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U products_user -d products_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      TEST_DATABASE_URL: postgresql://products_user:products_pass@localhost:5432/products_db

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile API module
        run: python -m py_compile main.py tests/test_main.py tests/test_integration.py tests/conftest.py

      - name: Run tests
        run: pytest